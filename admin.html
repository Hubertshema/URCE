<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Dashboard - UR CE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e6f0fa; text-align: center; margin-top: 50px; color: #333; }
        
        /* Layout Containers */
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 4px 15px rgba(0,0,0,0.2); width: 90%; max-width: 800px; margin: auto; }
        .login-box { max-width: 400px; }
        
        /* Forms and Inputs */
        input[type="email"], input[type="password"] { padding: 12px; width: 90%; margin-bottom: 15px; border: 2px solid #004488; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        button { padding: 12px 25px; background: #004488; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        button:hover { background: #003366; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin: 20px auto; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #004488; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .badge { background-color: #28a745; color: white; padding: 3px 8px; border-radius: 12px; font-size: 13px; font-weight: bold; }
        
        /* Buttons & Text */
        .btn-logout { background-color: #cc0000; margin-top: 20px; width: auto; display: inline-block; }
        .btn-logout:hover { background-color: #990000; }
        .error-message { color: red; font-weight: bold; margin-bottom: 15px; display: none; }
        
        /* Hide sections by default */
        #dashboard-section { display: none; }
    </style>
</head>
<body>

    <div class="container login-box" id="login-section">
        <h2 style="color: #004488;">Admin Login</h2>
        <p>Please log in to view visitor logs.</p>
        
        <p class="error-message" id="login-error"></p>
        
        <form id="login-form">
            <input type="email" id="email" placeholder="Admin Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        
        <div style="margin-top: 20px;">
            <a href="index.html" style="color: #004488; text-decoration: none;">← Back to Home</a>
        </div>
    </div>

    <div class="container" id="dashboard-section">
        <h2 style="color: #004488;">Student Visit Logs</h2>
        <p>This shows a unique list of students who have checked their marks.</p>
        
        <p id="loading-message" style="font-weight: bold; color: #004488;">Fetching logs...</p>

        <table id="logs-table" style="display: none;">
            <thead>
                <tr>
                    <th>S/N</th>
                    <th>Student Name</th>
                    <th>Registration Number (ID)</th>
                    <th>Total Checks</th>
                    <th>Most Recent Visit (Rwanda Time)</th>
                </tr>
            </thead>
            <tbody id="logs-body">
                </tbody>
        </table>

        <button onclick="logoutAdmin()" class="btn-logout">Log Out</button>
    </div>

    <script>
        // --- 1. SET UP SUPABASE ---
        const SUPABASE_URL = "https://bguagtnuoagmlskwqhgf.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJndWFndG51b2FnbWxza3dxaGdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzU3MjUsImV4cCI6MjA5NDg1MTcyNX0.EM7wYMgU748_XPZ8BdJwLzrN2Fr8w-oHsPGcDQYdAA0"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 2. CHECK SESSION ON PAGE LOAD ---
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                showDashboard();
            }
        }
        checkSession();

        // --- 3. HANDLE LOGIN FORM ---
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorElement = document.getElementById('login-error');

            errorElement.style.display = 'none';

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: emailInput,
                password: passwordInput,
            });

            if (error) {
                errorElement.innerText = error.message;
                errorElement.style.display = 'block';
            } else {
                showDashboard();
            }
        });

        // --- 4. SHOW DASHBOARD & FETCH DATA ---
        async function showDashboard() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';

            try {
                // Fetch all logs, ordered newest to oldest
                const { data, error } = await supabaseClient
                    .from('visitor_logs')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                displayData(data);

            } catch (error) {
                console.error("Error fetching data:", error.message);
                document.getElementById('loading-message').innerText = "Failed to load data. Ensure your RLS policies are correct.";
                document.getElementById('loading-message').style.color = "red";
            }
        }

        // --- 5. GROUP DATA AND RENDER TO TABLE ---
        function displayData(logs) {
            const tableBody = document.getElementById('logs-body');
            const table = document.getElementById('logs-table');
            const loadingMsg = document.getElementById('loading-message');

            loadingMsg.style.display = 'none';
            table.style.display = 'table';

            if (logs.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No logs found.</td></tr>";
                return;
            }

            // Step A: Group the logs by Registration Number
            const uniqueStudents = {};

            logs.forEach(log => {
                const id = log.reg_number;
                const name = log.student_name || "<i>No Name Saved</i>";
                const time = log.created_at;

                if (!uniqueStudents[id]) {
                    // First time seeing this ID (Because logs are sorted newest first, this is the most recent visit)
                    uniqueStudents[id] = {
                        name: name,
                        id: id,
                        visits: 1,
                        last_time: time
                    };
                } else {
                    // We've seen this ID before, just add to their total visits count
                    uniqueStudents[id].visits++;
                }
            });

            // Convert our grouped object into an array so we can sort it
            const studentsArray = Object.values(uniqueStudents);

            // Step B: Sort the array so the student who visited most recently is at the very top
            studentsArray.sort((a, b) => new Date(b.last_time) - new Date(a.last_time));

            // Step C: Build the HTML rows
            tableBody.innerHTML = ""; 
            
            studentsArray.forEach((student, index) => {
                // Format the time specifically for Rwanda Time
                const dateObj = new Date(student.last_time);
                const readableTime = dateObj.toLocaleString('en-US', { timeZone: 'Africa/Kigali' }); 
                
                const row = `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${student.name}</td>
                        <td><b>${student.id}</b></td>
                        <td><span class="badge">${student.visits}</span></td>
                        <td>${readableTime}</td>
                    </tr>
                `;
                tableBody.innerHTML += row; 
            });
        }

        // --- 6. HANDLE LOGOUT ---
        async function logoutAdmin() {
            const { error } = await supabaseClient.auth.signOut();
            if (!error) {
                document.getElementById('dashboard-section').style.display = 'none';
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('login-form').reset();
            }
        }
    </script>

</body>
</html>
