<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="monetag" content="4daa0c7243b6886d05e6b8e90551cf3f">
    <title>Student Marks Checker - UR CE</title>
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center;
            margin-top: 40px;
            background-color: #e6f0fa; 
            color: #333; 
        }
        .container { 
            background: white; 
            border-radius: 8px; 
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2); 
            display: inline-block; 
            max-width: 650px; 
            width: 90%; 
            overflow: hidden; 
            padding-bottom: 20px; 
        }
        .header-info { background-color: #004488; color: white; padding: 20px; }
        .header-info h2 { margin: 0 0 10px 0; font-size: 24px; }
        .header-info p { margin: 5px 0; font-size: 14px; }
        .header-info a { color: #b3d9ff; text-decoration: none; }
        .search-section { padding: 30px 20px 10px 20px; }
        input[type="text"] { padding: 12px; width: 70%; margin-bottom: 15px; border: 2px solid #004488; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        input[type="submit"] { padding: 12px 25px; background: #004488; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        input[type="submit"]:hover { background: #003366; }
        table { width: 90%; border-collapse: collapse; margin: 20px auto; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #004488; color: white; width: 40%; }
        td { background-color: #f9f9f9; }
        .error { color: red; margin-top: 15px; font-weight: bold; }
        .fail-mark { color: red; font-weight: bold; }
        
        .btn-group { margin-top: 20px; }
        .btn-print { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; font-weight: bold; margin-right: 10px; }
        .btn-print:hover { background-color: #218838; }
        .btn-reset { display: inline-block; padding: 10px 20px; background-color: #cc0000; color: white; text-decoration: none; border: none; border-radius: 4px; font-weight: bold; font-size: 15px; cursor: pointer; }
        .btn-reset:hover { background-color: #990000; }
        #loading { display: none; font-weight: bold; color: #004488; margin: 20px 0; }

        @media print {
            body { background-color: white; margin: 0; padding: 0; }
            .container { box-shadow: none; width: 100%; max-width: 100%; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            th { background-color: #004488 !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .header-info { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-info">
        <h2>College of Education</h2><br>
        <h3>Rukara Campus</h3>
    </div>

    <div class="search-section">
        
        <div id="form-section">
            <h3 style="color: #004488;" class="no-print">Check Your Marks</h3>
            <form id="searchForm" class="no-print">
                <input type="text" id="student_name" placeholder="Enter Your Full Name" required>
                <br>
                <input type="text" id="reg_number" placeholder="Enter Registration Number (ID)" required>
                <br>
                <input type="submit" value="Check Marks">
            </form>
        </div>

        <div id="loading">Searching database records, please wait...</div>
        <div id="result-section" style="display: none;"></div>

    </div>
</div>

<footer>
    <div class="no-print" style="margin-top: 30px; padding: 15px; border-top: 1px solid #ddd;">
        <a href="about.html" style="color: #004488; text-decoration: none; margin-right: 15px;">About Us</a>
        <span style="color: #999;">|</span>
        <a href="privacy.html" style="color: #004488; text-decoration: none; margin-left: 15px;">Privacy Policy</a>
    </div>
</footer>

<script>
    // --- 1. SUPABASE CONNECTION ---
    const SUPABASE_URL = "https://bguagtnuoagmlskwqhgf.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJndWFndG51b2FnbWxza3dxaGdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzU3MjUsImV4cCI6MjA5NDg1MTcyNX0.EM7wYMgU748_XPZ8BdJwLzrN2Fr8w-oHsPGcDQYdAA0"; 
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- 2. SEARCH HANDLER ---
    document.getElementById('searchForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const studentName = document.getElementById('student_name').value.trim();
        const regNumber = document.getElementById('reg_number').value.trim();
        
        const formSection = document.getElementById('form-section');
        const resultSection = document.getElementById('result-section');
        const loadingDiv = document.getElementById('loading');

        formSection.style.display = 'none';
        resultSection.style.display = 'none';
        loadingDiv.style.display = 'block';

        try {
            // Securely call the database RPC function to request the single matched row
            const { data, error } = await supabaseClient.rpc('get_my_marks', { search_id: regNumber });

            if (error) throw error;

            if (data && data.length > 0) {
                const record = data[0];
                const programName = record.program_name || "N/A";
                
                // Safely handle both Object and String types returned for JSONB columns
                const marksObject = typeof record.marks === 'string' ? JSON.parse(record.marks) : record.marks;
                
                // Render grades results to HTML layout
                renderResults(marksObject, regNumber, programName);
                
                // Log visit asynchronously in background
                logVisitToSupabase(studentName, regNumber);
            } else {
                showNotFound();
            }
        } catch (error) {
            console.error("Database connection failure:", error);
            showNotFound();
        }

        loadingDiv.style.display = 'none';
    });

    // --- 3. DYNAMIC RESULTS RENDERING ---
    function renderResults(marks, regNumber, programName) {
        const resultSection = document.getElementById('result-section');
        const metadataKeys = ['gender', 'total', 'percentage', 'percentag', 'rank'];
        
        let html = `<h3 style='color: #004488; margin-top:10px;'>Official Results</h3>`;
        html += `<h4 style='color: #333; margin-bottom:5px;'>Reg Number: ${regNumber}</h4>`;
        html += `<p style='color: #666; margin: 0 0 15px 0; font-weight: bold;'>Program: ${programName.toUpperCase()}</p>`;
        html += `<table>`;

        // Organize keys to show Gender first, then Modules, then Totals at the bottom
        const keys = Object.keys(marks);
        const sortedKeys = keys.sort((a, b) => {
            const isMetaA = metadataKeys.includes(a.toLowerCase());
            const isMetaB = metadataKeys.includes(b.toLowerCase());
            
            if (a.toLowerCase() === 'gender') return -1;
            if (b.toLowerCase() === 'gender') return 1;
            
            if (!isMetaA && isMetaB) return -1;
            if (isMetaA && !isMetaB) return 1;
            return 0;
        });

        // Iterate through properties dynamically stored in JSONB marks container
        for (const key of sortedKeys) {
            const value = marks[key];
            let displayValue = String(value);
            let displayHeader = key;

            // Handle clean naming for standard table metadata
            if (key.toLowerCase() === 'percentag' || key.toLowerCase() === 'percentage') {
                displayHeader = 'Percentage';
            } else if (key.toLowerCase() === 'total') {
                displayHeader = 'Total Score';
            } else if (key.toLowerCase() === 'rank') {
                displayHeader = 'Class Rank';
            } else if (key.toLowerCase() === 'gender') {
                displayHeader = 'Gender';
            }

            // Flag failure scores below 50 or absent values '-'
            const isMetadata = metadataKeys.includes(key.toLowerCase());
            if (!isMetadata) {
                const numericValue = parseFloat(value);
                if ((!isNaN(numericValue) && numericValue < 50) || value === '-') {
                    displayValue += " <span class='fail-mark'>(Retake)</span>";
                }
            }

            // Highlight the final summary stats row
            let rowStyle = "";
            if (isMetadata && key.toLowerCase() !== 'gender') {
                rowStyle = "style='background-color: #e6f0fa; font-weight: bold;'";
            }

            html += `<tr ${rowStyle}><th>${escapeHTML(displayHeader)}</th><td>${escapeHTML(displayValue)}</td></tr>`;
        }

        html += `</table>`;
        html += `
            <div class="btn-group no-print">
                <button onclick="window.print()" class="btn-print">Print / Save as PDF</button>
                <button onclick="resetSearch()" class="btn-reset">Search Again</button>
            </div>
        `;

        resultSection.innerHTML = html;
        resultSection.style.display = 'block';
    }

    function logVisitToSupabase(name, regNumber) {
        supabaseClient.from('visitor_logs').insert([{ student_name: name, reg_number: regNumber }])
            .then(() => console.log("Visit securely logged to database."))
            .catch(err => console.error("Logging failed:", err));
    }

    function showNotFound() {
        const resultSection = document.getElementById('result-section');
        resultSection.innerHTML = `
            <p class='error'>Registration Number not found in any record. Please verify your ID.</p>
            <div class="no-print" style="margin-top: 20px;">
                <button onclick="resetSearch()" class="btn-reset">Try Again</button>
            </div>
        `;
        resultSection.style.display = 'block';
    }

    function resetSearch() {
        document.getElementById('searchForm').reset();
        document.getElementById('result-section').style.display = 'none';
        document.getElementById('form-section').style.display = 'block';
    }

    function escapeHTML(str) {
        if (str.includes("<span class='fail-mark'>")) return str; 
        const div = document.createElement('div');
        div.innerText = str;
        return div.innerHTML;
    }
</script>

</body>
</html>
